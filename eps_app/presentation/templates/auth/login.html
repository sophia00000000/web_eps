{% extends 'base.html' %}
{% block content %}
<section class="hero" style="max-width: 760px; margin: 2rem auto 1rem;">
  <div class="badge">Acceso interno</div>
  <h1 class="page-title">Ingreso de empleados</h1>
  <p class="meta">Admin: administra todo. Médico: autorizaciones y citas. Auxiliar: afiliaciones y agenda.</p>
</section>

<section class="card" style="max-width: 760px; margin: 0 auto;">
  {% if error %}<p class="badge danger">{{ error }}</p>{% endif %}
  <form method="post">
    <label for="username">Usuario</label>
    <input id="username" name="username" placeholder="admin" autofocus>
    <label for="password">Clave</label>
    <input id="password" name="password" type="password" placeholder="admin">
    <button type="submit">Ingresar</button>
  </form>
</section>
{% endblock %}
